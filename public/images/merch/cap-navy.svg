<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg-cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dde9f6"/>
      <stop offset="100%" stop-color="#b6c8df"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b3a6b"/>
      <stop offset="100%" stop-color="#0b1f3a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg-cap)"/>
  <!-- ground shadow -->
  <ellipse cx="400" cy="640" rx="220" ry="22" fill="#000" opacity="0.15"/>
  <!-- cap -->
  <g transform="translate(400 400)">
    <!-- brim -->
    <path d="M-260 80 Q-260 30 -160 0 Q0 -10 160 0 Q260 30 260 80 Q260 110 200 115 Q-200 115 -260 110 Z" fill="url(#cap)" stroke="#000" stroke-width="2"/>
    <!-- crown -->
    <path d="M-180 -10 Q-200 -190 0 -210 Q200 -190 180 -10 Q60 30 -180 -10 Z" fill="url(#cap)" stroke="#000" stroke-width="2"/>
    <!-- panels -->
    <path d="M0 -210 Q-30 -100 -50 -10" stroke="#000" stroke-width="1.5" opacity="0.35" fill="none"/>
    <path d="M0 -210 Q30 -100 50 -10" stroke="#000" stroke-width="1.5" opacity="0.35" fill="none"/>
    <path d="M-90 -200 Q-120 -100 -130 -10" stroke="#000" stroke-width="1.5" opacity="0.35" fill="none"/>
    <path d="M90 -200 Q120 -100 130 -10" stroke="#000" stroke-width="1.5" opacity="0.35" fill="none"/>
    <!-- button -->
    <circle cx="0" cy="-205" r="6" fill="#ffd065"/>
    <!-- embroidery -->
    <g transform="translate(0 -100)">
      <text font-family="Inter, system-ui" font-weight="900" font-size="42" fill="#ffd065" text-anchor="middle">hh</text>
      <text y="22" font-family="Inter, system-ui" font-weight="700" font-size="12" letter-spacing="6" fill="#e85b3c" text-anchor="middle">DIVE</text>
    </g>
  </g>
  <text x="40" y="60" font-family="Inter, system-ui" font-weight="700" font-size="13" letter-spacing="4" fill="#0b1f3a">DAD CAP · DEEP NAVY</text>
</svg>

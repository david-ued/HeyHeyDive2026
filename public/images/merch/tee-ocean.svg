<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg-tee" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="100%" stop-color="#1b3a6b"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3aa1d6"/>
      <stop offset="100%" stop-color="#1b6fa8"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.35)"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg-tee)"/>
  <g opacity="0.18" stroke="#ffffff" stroke-width="1.5" fill="none">
    <path d="M0 540 Q200 510 400 540 T800 540"/>
    <path d="M0 600 Q200 565 400 600 T800 600"/>
    <path d="M0 660 Q200 625 400 660 T800 660"/>
  </g>
  <!-- shirt -->
  <g transform="translate(400 420)">
    <path d="M-205 -150 L-125 -185 Q-100 -120 0 -120 Q100 -120 125 -185 L205 -150 L255 -60 L160 -25 L160 220 Q70 240 0 240 Q-70 240 -160 220 L-160 -25 L-255 -60 Z" fill="url(#shirt)" stroke="#0b1f3a" stroke-width="3"/>
    <!-- collar -->
    <path d="M-50 -120 Q0 -85 50 -120" stroke="#0b1f3a" stroke-width="4" fill="none"/>
    <!-- chest logo -->
    <g transform="translate(0 30)">
      <text font-family="Inter, system-ui" font-weight="800" font-size="42" fill="#ffd065" text-anchor="middle">heyhey</text>
      <text y="34" font-family="Inter, system-ui" font-weight="600" font-size="14" letter-spacing="6" fill="#ffd065" text-anchor="middle">DIVE</text>
    </g>
  </g>
  <rect width="800" height="800" fill="url(#vignette)"/>
  <text x="40" y="60" font-family="Inter, system-ui" font-weight="700" font-size="13" letter-spacing="4" fill="#ffd065">CLASSIC TEE · S2 2026</text>
</svg>

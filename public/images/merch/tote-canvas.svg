<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg-tote" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2746"/>
      <stop offset="100%" stop-color="#0b1f3a"/>
    </linearGradient>
    <linearGradient id="tote" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e6c4"/>
      <stop offset="100%" stop-color="#d9c190"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg-tote)"/>
  <g opacity="0.18" stroke="#ffd065" stroke-width="1" fill="none">
    <circle cx="120" cy="120" r="3"/>
    <circle cx="620" cy="160" r="2"/>
    <circle cx="200" cy="700" r="3"/>
    <circle cx="700" cy="640" r="2"/>
  </g>
  <!-- tote -->
  <g transform="translate(400 400)">
    <!-- handles -->
    <path d="M-110 -230 Q-110 -320 -50 -320 Q-50 -260 -50 -240" stroke="#f3e6c4" stroke-width="10" fill="none"/>
    <path d="M110 -230 Q110 -320 50 -320 Q50 -260 50 -240" stroke="#f3e6c4" stroke-width="10" fill="none"/>
    <!-- bag body -->
    <rect x="-200" y="-230" width="400" height="450" rx="10" fill="url(#tote)" stroke="#0b1f3a" stroke-width="3"/>
    <!-- woven texture -->
    <g opacity="0.15">
      <path d="M-200 -180 H200" stroke="#0b1f3a" stroke-width="1"/>
      <path d="M-200 -130 H200" stroke="#0b1f3a" stroke-width="1"/>
      <path d="M-200 -80 H200" stroke="#0b1f3a" stroke-width="1"/>
      <path d="M-200 -30 H200" stroke="#0b1f3a" stroke-width="1"/>
      <path d="M-200 20 H200" stroke="#0b1f3a" stroke-width="1"/>
      <path d="M-200 70 H200" stroke="#0b1f3a" stroke-width="1"/>
      <path d="M-200 120 H200" stroke="#0b1f3a" stroke-width="1"/>
      <path d="M-200 170 H200" stroke="#0b1f3a" stroke-width="1"/>
    </g>
    <!-- print -->
    <g transform="translate(0 -40)">
      <text font-family="Inter, system-ui" font-weight="900" font-size="58" fill="#0b1f3a" text-anchor="middle">heyhey</text>
      <text y="40" font-family="Inter, system-ui" font-weight="700" font-size="18" letter-spacing="10" fill="#e85b3c" text-anchor="middle">DIVE · TAIWAN</text>
      <!-- wave -->
      <path d="M-90 90 Q-45 70 0 90 T90 90" stroke="#e85b3c" stroke-width="4" fill="none"/>
    </g>
  </g>
  <text x="40" y="60" font-family="Inter, system-ui" font-weight="700" font-size="13" letter-spacing="4" fill="#ffd065">CANVAS TOTE · NATURAL</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg-st" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7e8"/>
      <stop offset="100%" stop-color="#f5d8b6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg-st)"/>
  <!-- sticker 1: turtle circle -->
  <g transform="translate(220 240) rotate(-10)">
    <circle r="120" fill="#1b6fa8" stroke="#fff" stroke-width="10"/>
    <circle r="120" fill="none" stroke="#0b1f3a" stroke-width="3"/>
    <g fill="#ffd065">
      <ellipse cx="0" cy="0" rx="50" ry="36"/>
      <ellipse cx="60" cy="0" rx="22" ry="16"/>
      <ellipse cx="-44" cy="-32" rx="14" ry="10"/>
      <ellipse cx="44" cy="-32" rx="14" ry="10"/>
      <ellipse cx="-44" cy="32" rx="14" ry="10"/>
      <ellipse cx="44" cy="32" rx="14" ry="10"/>
    </g>
    <text font-family="Inter, system-ui" font-weight="800" font-size="14" fill="#fff" text-anchor="middle" y="78" letter-spacing="3">LIUQIU TURTLE</text>
  </g>
  <!-- sticker 2: wave rectangle -->
  <g transform="translate(540 200) rotate(8)">
    <rect x="-130" y="-80" width="260" height="160" rx="20" fill="#e85b3c" stroke="#fff" stroke-width="10"/>
    <rect x="-130" y="-80" width="260" height="160" rx="20" fill="none" stroke="#0b1f3a" stroke-width="3"/>
    <text font-family="Inter, system-ui" font-weight="900" font-size="42" fill="#fff" text-anchor="middle" y="-4">heyhey</text>
    <text font-family="Inter, system-ui" font-weight="700" font-size="14" letter-spacing="8" fill="#ffd065" text-anchor="middle" y="30">DIVE TAIWAN</text>
  </g>
  <!-- sticker 3: hot spring badge -->
  <g transform="translate(280 560) rotate(6)">
    <path d="M-110 -90 L110 -90 L130 0 L110 90 L-110 90 L-130 0 Z" fill="#ffd065" stroke="#fff" stroke-width="10"/>
    <path d="M-110 -90 L110 -90 L130 0 L110 90 L-110 90 L-130 0 Z" fill="none" stroke="#0b1f3a" stroke-width="3"/>
    <text font-family="Inter, system-ui" font-weight="900" font-size="34" fill="#0b1f3a" text-anchor="middle" y="0">LUDAO</text>
    <text font-family="Inter, system-ui" font-weight="700" font-size="11" letter-spacing="6" fill="#e85b3c" text-anchor="middle" y="28">HOT SPRING DIVE</text>
  </g>
  <!-- sticker 4: bubbles -->
  <g transform="translate(580 560) rotate(-8)">
    <circle r="90" fill="#3aa1d6" stroke="#fff" stroke-width="10"/>
    <circle r="90" fill="none" stroke="#0b1f3a" stroke-width="3"/>
    <circle cx="-20" cy="-20" r="14" fill="#fff" opacity="0.8"/>
    <circle cx="22" cy="-30" r="8" fill="#fff" opacity="0.7"/>
    <circle cx="35" cy="14" r="11" fill="#fff" opacity="0.85"/>
    <circle cx="-30" cy="30" r="6" fill="#fff" opacity="0.7"/>
    <text font-family="Inter, system-ui" font-weight="800" font-size="13" fill="#fff" text-anchor="middle" y="62" letter-spacing="3">BREATHE</text>
  </g>
  <text x="40" y="60" font-family="Inter, system-ui" font-weight="700" font-size="13" letter-spacing="4" fill="#0b1f3a">STICKER SET · 4 PIECES</text>
</svg>
